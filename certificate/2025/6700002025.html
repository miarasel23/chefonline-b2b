<script>
	function includeHTML() {
		const elements = document.querySelectorAll('[include-html]');
		elements.forEach((el) => {
			const file = el.getAttribute('include-html');
			if (file) {
				fetch(file)
					.then((resp) => {
						if (!resp.ok) throw new Error(`Failed to load ${file}`);
						return resp.text();
					})
					.then((data) => {
						el.innerHTML = data;
						el.removeAttribute('include-html');
						includeHTML(); // in case nested includes exist
					})
					.catch((err) => {
						el.innerHTML = `<p style="color:red;">${err}</p>`;
					});
			}
		});
	}
	includeHTML();
</script>

<script>
	// Build share links with the current URL
	(function () {
		var url = encodeURIComponent(location.href);
		var title = encodeURIComponent(document.title || 'ARTA 2025 CERTIFICATE');
		var fb = document.getElementById('share-fb');
		var li = document.getElementById('share-li');

		if (fb) fb.href = 'https://www.facebook.com/sharer/sharer.php?u=' + url;
		if (li) li.href = 'https://www.linkedin.com/sharing/share-offsite/?url=' + url + '&title=' + title;

		// open in a small centered popup
		function popup(e) {
			var w = 640,
				h = 560;
			var y = window.top.outerHeight / 2 + window.top.screenY - h / 2;
			var x = window.top.outerWidth / 2 + window.top.screenX - w / 2;
			window.open(this.href, 'share', 'width=' + w + ',height=' + h + ',left=' + x + ',top=' + y);
			e.preventDefault();
		}
		if (fb) fb.addEventListener('click', popup);
		if (li) li.addEventListener('click', popup);
	})();
</script>
